server:
  port: 8080
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

spring:
  application:
    name: StudentManagementProject

  datasource:
    url: jdbc:postgresql://localhost:5432/feesDb
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
    initialization-mode: always

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false

# File storage configuration (AWS S3)
file:
  storage:
    s3-bucket-name: ${S3_BUCKET_NAME:my-student-management-bucket}
    s3-region: ${AWS_REGION:us-east-1}
    max-file-size: 5242880  # 5MB in bytes
    presigned-url-expiration-minutes: 60
    allowed-extensions:
      - jpg
      - jpeg
      - png
      - gif
    allowed-mime-types:
      - image/jpeg
      - image/png
      - image/gif
