server:
  port: 8080
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

spring:
  application:
    name: Institute of Junior Accountants

  datasource:
    url: jdbc:postgresql://localhost:5432/feesDb
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
    initialization-mode: always

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false

# File storage configuration
file:
  storage:
    max-file-size: 5242880  # 5MB in bytes
    allowed-extensions:
      - jpg
      - jpeg
      - png
      - gif
    allowed-mime-types:
      - image/jpeg
      - image/png
      - image/gif
