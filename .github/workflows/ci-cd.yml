name: CI/CD - Build, Dockerize & Push

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:          # allow manual trigger from GitHub UI

env:
  DOCKER_IMAGE: iamdebjit3107/ija-admin-app
  RELEASE_VERSION: 1.0.0

jobs:
  build-and-push:
    name: Maven Build → Docker Build → Push to DockerHub
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up JDK 17 ──────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # ── 3. Maven Build (compile, test, package) ───────────────────
      - name: Build with Maven
        run: ./mvnw clean package -Drevision=${{ env.RELEASE_VERSION }} -DskipTests --batch-mode --no-transfer-progress

      # ── 4. Upload JAR as artifact (optional, handy for debugging) ─
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 7

      # ── 5. Docker metadata (tags & labels) ────────────────────────
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=${{ env.RELEASE_VERSION }}
            type=raw,value=${{ env.RELEASE_VERSION }}-{{sha}}
            type=raw,value=latest,enable={{is_default_branch}}

      # ── 6. Set up Docker Buildx ───────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 7. Log in to DockerHub ────────────────────────────────────
      - name: Log in to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 8. Build & Push Docker image ──────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

