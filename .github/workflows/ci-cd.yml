name: CI/CD - Build, Dockerize & Push

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:          # allow manual trigger from GitHub UI

env:
  DOCKER_IMAGE: iamdebjit3107/ija-admin-app
  RELEASE_VERSION: 1.0.0

jobs:
  build-and-push:
    name: Maven Build → Docker Build → Push to DockerHub
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up JDK 17 ──────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # ── 3. Maven Build + Docker Image (compile, test, package, docker:build) ──
      - name: Build with Maven (JAR + Docker image)
        run: mvn clean install -Pdocker -Drevision=${{ env.RELEASE_VERSION }} -DskipTests --batch-mode --no-transfer-progress

      # ── 4. Upload JAR as artifact (optional, handy for debugging) ─
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 7

      # ── 5. Log in to DockerHub ────────────────────────────────────
      - name: Log in to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 6. Push Docker image to DockerHub ─────────────────────────
      - name: Push Docker image
        if: github.event_name != 'pull_request'
        run: mvn docker:push -Pdocker -Drevision=${{ env.RELEASE_VERSION }} --batch-mode --no-transfer-progress

